[pytest]
# Pytest configuration for TransNote

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --asyncio-mode=auto

# Markers
markers =
    asyncio: mark test as async
    slow: mark test as slow running
    integration: mark test as integration test
    unit: mark test as unit test

# Async settings
asyncio_mode = auto

# Coverage (if pytest-cov is installed)
# addopts = --cov=src/notely --cov-report=html --cov-report=term
